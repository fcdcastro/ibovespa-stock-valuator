<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risco x Retorno — Le Gran</title>
    <meta name="description" content="Análise de Risco x Retorno das ações da B3 com base na divergência entre modelos preditivos.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .rr-layout {
            display: grid;
            grid-template-columns: 2fr 3fr;
            gap: 1rem;
            padding: 0 10px 1rem;
        }
        @media (max-width: 900px) {
            .rr-layout { grid-template-columns: 1fr; }
        }
        .rr-card {
            background: #0d0d0d;
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            padding: 1rem;
        }
        .rr-card h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .chart-container { position: relative; width: 100%; height: 650px; }

        .rr-table-wrap {
            overflow-y: auto;
            max-height: 55vh;
        }
        .rr-table { width: 100%; border-collapse: collapse; }
        .rr-table th {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            padding: 0.3rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
            background: #0d0d0d;
            position: sticky;
            top: 0;
        }
        .rr-table td {
            font-size: 0.78rem;
            padding: 0.35rem 0.5rem;
            border-bottom: 1px solid #1a1a1a;
            white-space: nowrap;
        }
        .rr-table tr:hover td { background: rgba(0,255,65,0.05); }
        .rr-table tr.selected td { background: rgba(0,255,65,0.1); }
        .rr-score {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-weight: 700;
            font-size: 0.7rem;
        }
        .rr-score.A { background: rgba(0,255,65,0.2); color: var(--success); }
        .rr-score.B { background: rgba(0,255,65,0.1);  color: #88ff88; }
        .rr-score.C { background: rgba(255,204,0,0.15); color: var(--warning); }
        .rr-score.D { background: rgba(255,77,77,0.15); color: var(--danger); }
        .rr-score.E { background: rgba(255,77,77,0.3);  color: #ff4444; }

        .risk-bar-wrap { background: #1a1a1a; border-radius: 3px; height: 4px; width: 60px; display: inline-block; vertical-align: middle; margin-left: 0.3rem; }
        .risk-bar { height: 4px; border-radius: 3px; }
        .risk-bar.low  { background: var(--success); }
        .risk-bar.med  { background: var(--warning); }
        .risk-bar.high { background: var(--danger); }

        .filter-chip {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .filter-chip:hover { border-color: var(--accent-color); color: var(--accent-color); }
        .filter-chip.active { background: var(--accent-color); color: #050505; border-color: var(--accent-color); font-weight: 700; }
        .filter-chip[data-filter="ibov"].active { background: #00ff41; color: #050505; }
        .filter-chip[data-filter="small"].active { background: #ffaa00; color: #050505; }
    </style>
</head>
<body>
    <div class="background-glow"></div>

    <nav>
        <div class="nav-content">
            <div class="logo">
                <i data-lucide="activity" class="logo-icon"></i>
                <span>Le Gran — <span>Risco x Retorno</span></span>
            </div>
            <div class="nav-links">
                <button class="nav-btn" onclick="window.location.href='index.html'">Análise Atual</button>
                <button class="nav-btn" onclick="window.location.href='preditiva.html'">Análise Preditiva</button>
                <button class="nav-btn" onclick="window.location.href='comparacao.html'">Comparação de Modelos</button>
                <button class="nav-btn" onclick="window.location.href='correlacao.html'">Correlação</button>
                <button class="nav-btn active">Risco x Retorno</button>
            </div>
        </div>
    </nav>

    <main>
        <div id="debug-info" style="margin:10px;padding:10px;background:#1a1a1a;color:#ff4444;font-size:0.75rem;border:1px solid #ff4444;border-radius:4px;display:none;"></div>
        <div id="error-banner" class="error-banner hidden" style="margin: 10px;">
            <i data-lucide="alert-triangle"></i>
            <span id="error-message">Erro ao conectar com o servidor.</span>
            <button class="error-close" onclick="this.parentElement.classList.add('hidden')">&times;</button>
        </div>

        <section class="controls-row" style="margin-bottom:1rem;">
            <div class="stats-grid" id="summary-stats">
                <div class="stat-card">
                    <span class="stat-label">Ativos Analisados</span>
                    <span class="stat-value" id="stat-total">-</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Melhor Relação Risco/Retorno</span>
                    <span class="stat-value highlight" id="stat-best">-</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Menor Risco</span>
                    <span class="stat-value" id="stat-lowrisk">-</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Maior Retorno Esperado</span>
                    <span class="stat-value" id="stat-highest">-</span>
                </div>
            </div>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap; padding:0 10px;">
                <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">Todos</button>
                <button class="filter-chip" data-filter="ibov" onclick="setFilter('ibov')">Ibovespa</button>
                <button class="filter-chip" data-filter="small" onclick="setFilter('small')">Small/Mid Caps</button>
            </div>
        </section>

        <div class="rr-layout">
            <div class="rr-card">
                <h3><i data-lucide="list"></i> Tabela Risco x Retorno
                    <span id="selection-indicator" style="display:none;margin-left:auto;font-size:0.7rem;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-secondary);">
                        <span style="color:var(--accent-color);font-weight:700;" id="selected-label"></span>
                        <button onclick="clearSelection()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:1rem;padding:0 0.2rem 0 0.4rem;font-family:inherit;" title="Limpar seleção">&times;</button>
                    </span>
                </h3>
                <div class="rr-table-wrap">
                    <table class="rr-table" id="rr-table">
                        <thead>
                            <tr>
                                <th>Ticker</th>
                                <th>Retorno</th>
                                <th>Risco</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody id="rr-table-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="rr-card">
                <h3><i data-lucide="scatter-chart"></i> Risco x Retorno Esperado</h3>
                <div class="chart-container">
                    <canvas id="scatter-chart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        const IBOV_TICKERS = [
            "PETR4","VALE3","ITUB4","BBDC4","BBAS3","ABEV3","B3SA3","WEGE3","SUZB3","RENT3",
            "LREN3","JBSS3","RADL3","EQTL3","ELET3","ELET6","HAPV3","PRIO3","RDOR3","RAIL3",
            "SBSP3","VIVT3","BBSE3","CPLE6","CMIG4","CCRO3","CSNA3","GGBR4","USIM5","BRFS3",
            "TOTS3","ASAI3","NTCO3","KLBN11","TIMS3","BPAC11","CSAN3","MGLU3","EGIE3","CPFE3",
            "CYRE3","MULT3","VBBR3","CRFB3","ENGI11","TAEE11","TRPL4","ALOS3","IGTI11"
        ];
        function classifyTicker(tkr) {
            return IBOV_TICKERS.includes(tkr) ? 'ibov' : 'small';
        }

        let currentFilter = 'all';
        let stocks = [];
        let scatterChartInstance = null;
        let selectedTicker = null;

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-chip[data-filter]').forEach(function(el) {
                el.classList.toggle('active', el.dataset.filter === f);
            });
            renderAll();
        }

        function calcRisk(stock) {
            var score = 0;
            if (stock.debt_equity > 3)          score += 3;
            else if (stock.debt_equity > 1.5)   score += 1.5;
            else if (stock.debt_equity > 0.5)   score += 0.5;
            if (stock.net_margin < -5)           score += 3;
            else if (stock.net_margin < 0)       score += 1.5;
            if (stock.roe < -5)                  score += 2;
            else if (stock.roe < 0)              score += 1;
            if (stock.p_e === 0 || stock.p_e === null) score += 1;
            if (stock.volume < 1000000)           score += 1;
            return score;
        }

        document.addEventListener('DOMContentLoaded', function() {
            var errorBanner = document.getElementById('error-banner');
            var errorMessage = document.getElementById('error-message');

            function showError(msg) {
                if (errorMessage) errorMessage.textContent = msg;
                if (errorBanner) errorBanner.classList.remove('hidden');
            }
            function hideError() {
                if (errorBanner) errorBanner.classList.add('hidden');
            }

            var raw = window.__STOCK_DATA__;
            if (!raw) {
                showError('Dados nao carregados. Aguarde o pipeline.');
                return;
            }

            stocks = raw.stocks || raw;
            if (!stocks || stocks.length === 0) {
                showError('Nenhum ativo disponivel.');
                return;
            }

            hideError();
            renderAll();
            lucide.createIcons();
        });

        function clearSelection() {
            selectedTicker = null;
            renderAll();
        }

        function renderAll() {
            var dataPoints = [];
            for (var i = 0; i < stocks.length; i++) {
                var s = stocks[i];
                if (!s.price || s.price <= 0) continue;
                if (s.expected_return_3m === undefined) continue;
                var retorno = (s.upside !== undefined && s.upside > -100) ? s.upside : s.expected_return_3m;
                var risco = calcRisk(s);
                var cat = classifyTicker(s.ticker);
                dataPoints.push({ ticker: s.ticker, retorno: retorno, risco: risco, category: cat });
            }

            var filtered = dataPoints;
            if (currentFilter === 'ibov') {
                filtered = dataPoints.filter(function(d) { return d.category === 'ibov'; });
            } else if (currentFilter === 'small') {
                filtered = dataPoints.filter(function(d) { return d.category === 'small'; });
            }

            var indicator = document.getElementById('selection-indicator');
            var label = document.getElementById('selected-label');
            if (selectedTicker && indicator && label) {
                indicator.style.display = 'inline';
                label.textContent = selectedTicker;
            } else if (indicator) {
                indicator.style.display = 'none';
            }

            renderChart(filtered);
            renderTable(filtered);
            renderStats(filtered);
        }

        function renderChart(data) {
            var canvas = document.getElementById('scatter-chart');
            if (!canvas) return;
            var ctx;
            try { ctx = canvas.getContext('2d'); } catch(e) { console.error('getContext error:', e); return; }
            if (scatterChartInstance) { scatterChartInstance.destroy(); scatterChartInstance = null; }

            var ibovData = [];
            var smallData = [];
            for (var i = 0; i < data.length; i++) {
                var d = data[i];
                var pt = { x: d.risco, y: d.retorno, ticker: d.ticker };
                if (d.category === 'ibov') {
                    ibovData.push(pt);
                } else {
                    smallData.push(pt);
                }
            }

            var sel = selectedTicker;
            function styleDataset(label, points, baseColor, highlightColor) {
                var bg = [], border = [], radius = [], hoverRadius = [];
                for (var i = 0; i < points.length; i++) {
                    if (sel && points[i].ticker === sel) {
                        bg.push(highlightColor);
                        border.push(highlightColor);
                        radius.push(12);
                        hoverRadius.push(16);
                    } else if (sel) {
                        bg.push('rgba(255,255,255,0.04)');
                        border.push('rgba(255,255,255,0.08)');
                        radius.push(3);
                        hoverRadius.push(5);
                    } else {
                        bg.push(baseColor);
                        border.push(baseColor.replace('0.5', '0.9'));
                        radius.push(5);
                        hoverRadius.push(8);
                    }
                }
                return {
                    label: label,
                    data: points,
                    pointBackgroundColor: bg,
                    pointBorderColor: border,
                    pointBorderWidth: 1,
                    pointRadius: radius,
                    pointHoverRadius: hoverRadius
                };
            }

            var datasets = [];
            if (ibovData.length > 0) {
                datasets.push(styleDataset('Ibovespa', ibovData, 'rgba(0,255,65,0.5)', 'rgba(0,255,65,1)'));
            }
            if (smallData.length > 0) {
                datasets.push(styleDataset('Small/Mid Caps', smallData, 'rgba(255,170,0,0.5)', 'rgba(255,200,0,1)'));
            }

            try {
                scatterChartInstance = new Chart(ctx, {
                    type: 'scatter',
                    data: { datasets: datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { duration: 300 },
                        onClick: function(e, elements) {
                            if (elements.length > 0) {
                                var el = elements[0];
                                var ticker = this.data.datasets[el.datasetIndex].data[el.index].ticker;
                                selectedTicker = (selectedTicker === ticker) ? null : ticker;
                                renderAll();
                            }
                        },
                        plugins: {
                            legend: {
                                labels: { color: '#4dff79', font: { size: 10 } }
                            },
                            tooltip: {
                                backgroundColor: '#0d0d0d',
                                borderColor: '#00ff41',
                                borderWidth: 1,
                                titleColor: '#00ff41',
                                bodyColor: '#4dff79',
                                callbacks: {
                                    title: function(items) {
                                        var item = items[0];
                                        return item.raw && item.raw.ticker ? item.raw.ticker : '';
                                    },
                                    label: function(ctx) {
                                        var d = ctx.raw;
                                        if (!d) return '';
                                        var ret = d.y >= 0 ? '+' + d.y.toFixed(2) + '%' : d.y.toFixed(2) + '%';
                                        return ' Retorno: ' + ret + '  Risco: ' + d.x.toFixed(2);
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                title: { display: true, text: 'Risco (Score)', color: '#4dff79', font: { size: 11 } },
                                grid: { color: '#1a1a1a' },
                                ticks: { color: '#4dff79', font: { size: 9 } }
                            },
                            y: {
                                title: { display: true, text: 'Retorno Esperado (%)', color: '#4dff79', font: { size: 11 } },
                                grid: { color: '#1a1a1a' },
                                ticks: {
                                    color: '#4dff79', font: { size: 9 },
                                    callback: function(v) { return v >= 0 ? '+' + v.toFixed(1) + '%' : v.toFixed(1) + '%'; }
                                }
                            }
                        }
                    }
                });
                var debugEl = document.getElementById('debug-info');
                if (debugEl) { debugEl.textContent = 'Chart OK - ' + data.length + ' pontos'; debugEl.style.display = 'block'; debugEl.style.color = '#00ff41'; debugEl.style.borderColor = '#00ff41'; }
            } catch(e) {
                console.error('Chart creation error:', e);
                var debugEl = document.getElementById('debug-info');
                if (debugEl) { debugEl.textContent = 'ERRO: ' + e.message; debugEl.style.display = 'block'; }
            }
        }

        function scoreLabel(r) {
            if (r >= 2)  return 'A';
            if (r >= 1)  return 'B';
            if (r >= 0)  return 'C';
            if (r >= -1) return 'D';
            return 'E';
        }

        function renderTable(data) {
            var tbody = document.getElementById('rr-table-body');
            tbody.innerHTML = '';

            var scored = data.map(function(d) {
                var rr = d.risco > 0 ? d.retorno / d.risco : d.retorno;
                return { ticker: d.ticker, retorno: d.retorno, risco: d.risco, rr: rr };
            });
            scored.sort(function(a, b) { return b.rr - a.rr; });

            for (var i = 0; i < scored.length; i++) {
                var d = scored[i];
                var tr = document.createElement('tr');
                tr.style.cursor = 'pointer';
                if (d.ticker === selectedTicker) tr.classList.add('selected');
                var score = scoreLabel(d.rr);
                var retStr = d.retorno >= 0 ? '+' + d.retorno.toFixed(2) + '%' : d.retorno.toFixed(2) + '%';
                var riskPct = Math.min(d.risco / 30 * 100, 100);
                var riskClass = d.risco < 8 ? 'low' : d.risco < 18 ? 'med' : 'high';

                tr.innerHTML =
                    '<td style="font-weight:700;color:var(--accent-color)">' + d.ticker + '</td>' +
                    '<td style="color:' + (d.retorno >= 0 ? 'var(--success)' : 'var(--danger)') + '">' + retStr + '</td>' +
                    '<td>' + d.risco.toFixed(2) + '<div class="risk-bar-wrap"><div class="risk-bar ' + riskClass + '" style="width:' + riskPct + '%"></div></div></td>' +
                    '<td><span class="rr-score ' + score + '">' + score + '</span></td>';

                tr.addEventListener('click', function(ticker) {
                    return function() {
                        selectedTicker = (selectedTicker === ticker) ? null : ticker;
                        renderAll();
                    };
                }(d.ticker));
                tbody.appendChild(tr);
            }
        }

        function renderStats(data) {
            document.getElementById('stat-total').textContent = data.length;
            if (data.length === 0) return;

            var scored = data.map(function(d) {
                var rr = d.risco > 0 ? d.retorno / d.risco : d.retorno;
                return { ticker: d.ticker, retorno: d.retorno, risco: d.risco, rr: rr };
            });
            scored.sort(function(a, b) { return b.rr - a.rr; });

            var best = scored[0];
            document.getElementById('stat-best').innerHTML = best.ticker + ' <span style="font-size:0.65rem;color:var(--text-secondary);font-weight:400">(' + (best.retorno >= 0 ? '+' : '') + best.retorno.toFixed(1) + '% / risco ' + best.risco.toFixed(1) + ')</span>';

            var lowestRisk = data.reduce(function(a,b) { return a.risco < b.risco ? a : b; });
            document.getElementById('stat-lowrisk').innerHTML = lowestRisk.ticker + ' <span style="font-size:0.65rem;color:var(--text-secondary);font-weight:400">(risco ' + lowestRisk.risco.toFixed(1) + ')</span>';

            var highestRet = data.reduce(function(a,b) { return a.retorno > b.retorno ? a : b; });
            document.getElementById('stat-highest').innerHTML = highestRet.ticker + ' <span style="font-size:0.65rem;color:var(--text-secondary);font-weight:400">(' + (highestRet.retorno >= 0 ? '+' : '') + highestRet.retorno.toFixed(1) + '%)</span>';
        }
    </script>
</body>
</html>
