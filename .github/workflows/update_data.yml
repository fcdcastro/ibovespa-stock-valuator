name: Update Stock Data

on:
  schedule:
    - cron: '0 21 * * 1-5' # Runs at 21:00 UTC (18:00 BRT) every weekday
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/checkout@v3
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run valuation script
      env:
        BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
      run: python main.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data.json valuation_results.csv
        git commit -m "Update stock data [skip ci]" || echo "No changes to commit"
        git push
